<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>◈ MORTAL MACHINE | HYPER-SCALE STREAM</title>
    <style>
        :root {
            --bg-body: #080809;
            --bg-sidebar: rgba(13, 13, 14, 0.95);
            --bg-header: rgba(24, 24, 27, 0.9);
            --text-main: #e2e2e4;
            --text-muted: #a1a1aa;
            --text-gold: #D4AF37;
            --link-color: #38bdf8;
            --border-gold: #D4AF37;
            --border-dim: #27272a;
            --row-height: 110px; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            overflow: hidden;
            background-image: 
                linear-gradient(rgba(212, 175, 55, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212, 175, 55, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        h1, h2, h3 { font-family: 'Courier New', Courier, monospace; }

        .mortal-machine-wrapper {
            display: grid;
            grid-template-columns: 340px 1fr;
            height: 100vh;
            width: 100%;
        }

        /* --- SIDEBAR FLEX ENGINE --- */
        .sidebar-left {
            background-color: var(--bg-sidebar);
            backdrop-filter: blur(12px);
            border-right: 2px solid var(--border-gold);
            padding: 25px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            z-index: 101;
        }

        .sidebar-scroll-area {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
        }

        .sidebar-scroll-area::-webkit-scrollbar { width: 3px; }
        .sidebar-scroll-area::-webkit-scrollbar-thumb { background: var(--border-dim); }

        .filter-group { margin-bottom: 20px; }
        label { display: block; font-family: 'Courier New', monospace; font-size: 11px; font-weight: 900; color: var(--text-gold); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 2px; }
        input, select { width: 100%; background: #000; border: 1px solid var(--border-dim); padding: 12px; color: var(--text-main); font-family: 'Courier New', monospace; outline: none; }
        input:focus { border-color: var(--text-gold); }

        .primary-btn { background: var(--text-gold); color: #000; border: none; padding: 14px; font-family: 'Courier New', monospace; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; font-size: 11px; }

        #stats { 
            margin: 15px 0; border: 1px solid var(--border-gold); padding: 12px; 
            text-align: center; color: var(--text-gold); font-family: monospace; 
            background: rgba(212, 175, 55, 0.05); font-size: 11px; flex-shrink: 0;
        }

        .manual-box {
            padding: 15px; border: 1px solid var(--border-gold); 
            background: rgba(212, 175, 55, 0.05); font-family: 'Courier New', monospace; 
            font-size: 11px; color: var(--text-muted); line-height: 1.4; flex-shrink: 0;
        }

        /* --- VIEWPORT ENGINE --- */
        .main-column { display: flex; flex-direction: column; height: 100vh; position: relative; }
        header.terminal-header { background-color: var(--bg-header); padding: 20px 40px; border-bottom: 2px solid var(--border-gold); display: flex; justify-content: space-between; align-items: center; z-index: 100; }

        #viewport { flex: 1; overflow-y: auto; position: relative; scroll-behavior: auto; }
        #virtual-spacer { position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; }
        #v-table { width: 100%; border-collapse: collapse; position: absolute; top: 0; left: 0; table-layout: fixed; will-change: transform; }

        .v-row { 
            height: var(--row-height); border-bottom: 1px solid var(--border-dim);
            position: absolute; width: 100%; display: flex; align-items: center;
            backface-visibility: hidden;
        }

        .v-td { padding: 15px 25px; flex: 1; overflow: hidden; vertical-align: middle; }
        .paper-title { font-family: 'Courier New', Courier, monospace; font-weight: 900; font-size: 1.1rem; color: #fff; display: block; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
        .paper-authors { color: var(--text-muted); font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="mortal-machine-wrapper">
    <aside class="sidebar-left">
        <div class="sidebar-scroll-area">
            <h2 style="color: var(--text-gold); font-size: 1.4rem; margin-bottom: 4px; font-weight: 900;">◈ PAPER BANK</h2>
            <p style="color: var(--text-gold); font-size: 10px; font-weight: 800; letter-spacing: 2px; margin-bottom: 30px; opacity: 0.7;">Remote Hyper-Scale Vault</p>

            <div class="filter-group">
                <label>[ SEARCH_PAPER ]</label>
                <input type="text" id="searchMain" oninput="debouncedUpdate()" placeholder="Keywords...">
            </div>

            <div class="filter-group">
                <label>[ JUMP_TO_INDEX ]</label>
                <div style="display: flex; gap: 8px;">
                    <input type="number" id="jumpIndex" placeholder="Row #">
                    <button onclick="jumpToIndex()" style="background: var(--bg-header); border: 1px solid var(--text-gold); color: var(--text-gold); padding: 0 15px; cursor: pointer; font-family: monospace;">GO</button>
                </div>
            </div>

            <div class="filter-group">
                <label>[ AUTHOR_FILTER ]</label>
                <input type="text" id="searchAuthor" list="authorSuggestions" oninput="debouncedAuthorInput()" placeholder="Personnel...">
                <datalist id="authorSuggestions"></datalist>
            </div>

            <div style="display: flex; gap: 10px; margin-bottom: 25px;">
                <div style="flex:1">
                    <label>YR_MIN</label>
                    <input type="number" id="yearMin" oninput="debouncedUpdate()" placeholder="1990">
                </div>
                <div style="flex:1">
                    <label>YR_MAX</label>
                    <input type="number" id="yearMax" oninput="debouncedUpdate()" placeholder="2026">
                </div>
            </div>

            <button class="primary-btn" onclick="saveState()">Commit Progress</button>
            <button class="primary-btn" style="background: transparent; border: 1px solid var(--text-gold); color: var(--text-gold);" onclick="exportSelectedCSV()">Export Records</button>
        </div>

        <div id="stats">LINKING_PORTAL...</div>

        <div class="manual-box">
            <div style="color: var(--text-gold); font-weight: 900; margin-bottom: 8px; border-bottom: 1px solid var(--border-gold); padding-bottom: 4px;">[ SYSTEM_MANUAL ]</div>
            • <b>STREAM:</b> Ingesting 512MB from Remote.<br>
            • <b>MEMORY:</b> Slimmed ingest to prevent OOM.<br>
            • <b>STABLE:</b> Clamped infinite scroll engine.
        </div>
    </aside>

    <main class="main-column">
        <header class="terminal-header">
            <h1 style="color: #fff; font-size: 1.2rem; font-weight: 900;">◈ GLOBAL AI RESEARCH ARCHIVE</h1>
            <div style="display: flex; align-items: center; gap: 15px;">
                <label style="margin:0; color: var(--text-muted); font-size: 10px;">SORT:</label>
                <select id="sortSelect" onchange="handleUpdate()" style="width: auto; padding: 6px 12px; background: #000;">
                    <option value="citations">Citations</option>
                    <option value="year">Year</option>
                    <option value="title">Title</option>
                </select>
                <select id="sortOrder" onchange="handleUpdate()" style="width: auto; padding: 6px 12px; background: #000;">
                    <option value="desc">DESC</option>
                    <option value="asc">ASC</option>
                </select>
            </div>
        </header>

        <div id="viewport">
            <div id="virtual-spacer"></div>
            <table id="v-table">
                <tbody id="v-body"></tbody>
            </table>
        </div>
    </main>
</div>

<script>
    let allPapers = [];
    let selectedIds = new Set(JSON.parse(localStorage.getItem('selectedPapers')) || []);
    let filtered = [];
    let searchTimeout;
    
    const ROW_HEIGHT = 110;
    const VISIBLE_COUNT = 25; 
    const MAX_BROWSER_HEIGHT = 1000000; 
    let scrollScale = 1;

    const viewport = document.getElementById('viewport');
    const vBody = document.getElementById('v-body');
    const spacer = document.getElementById('virtual-spacer');
    const vTable = document.getElementById('v-table');
    
    // const REMOTE_URL = "https://corsproxy.io/?" + encodeURIComponent("https://github.com/rajatmodi62/site_media_2/releases/download/push_paperdb/papers.json");
    // const REMOTE_URL = "https://github.com/rajatmodi62/site_media_2/releases/download/push_paperdb/papers.json";
    const REMOTE_URL = "https://huggingface.co/datasets/rmodiucf/site_backend/resolve/main/papers.json?download=true";
    async function initVault() {
        const stats = document.getElementById('stats');
        try {
            stats.innerText = "OPENING_REMOTE_STREAM...";
            const response = await fetch(REMOTE_URL);
            if (!response.ok) throw new Error("REMOTE_CONNECTION_FAILED");

            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");
            let buffer = "";
            let count = 0;

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                let parts = buffer.split('},');
                buffer = parts.pop();

                for (let part of parts) {
                    try {
                        let clean = part.trim();
                        if (clean.startsWith('[')) clean = clean.substring(1);
                        clean += '}';
                        const raw = JSON.parse(clean);
                        
                        // MEMORY OPTIMIZATION: Only keep essential fields
                        // This prevents 512MB text from crashing the browser RAM
                        allPapers.push({
                            title: raw.title,
                            authors: raw.authors,
                            citations: Number(raw.citations) || 0,
                            year: Number(raw.year) || 0,
                            url: raw.url || raw.doi,
                            // Note: We don't pre-lowercase to save 500MB of RAM
                            // Lowercasing happens on the fly during search
                        });
                        
                        count++;
                        if (count === 1000) handleUpdate();
                    } catch (e) { continue; }
                }
                if (count % 10000 === 0) stats.innerText = `STREAMING: ${count.toLocaleString()}...`;
            }
            stats.innerText = `${allPapers.length.toLocaleString()} RECORDS LOADED`;
            handleUpdate();
        } catch (err) {
            stats.innerText = "FAIL: REMOTE_ASSET_UNREACHABLE";
            console.error(err);
        }
    }

    function debouncedUpdate() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(handleUpdate, 350);
    }

    function debouncedAuthorInput() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            updateAuthorSuggestions();
            handleUpdate();
        }, 350);
    }

    function handleUpdate() {
        const q = document.getElementById('searchMain').value.toLowerCase();
        const auth = document.getElementById('searchAuthor').value.toLowerCase();
        const min = parseInt(document.getElementById('yearMin').value) || 0;
        const max = parseInt(document.getElementById('yearMax').value) || 2026;
        const sortField = document.getElementById('sortSelect').value;
        const order = document.getElementById('sortOrder').value;

        // Perform search (Lowercasing on the fly to save RAM)
        filtered = allPapers.filter(p => {
            const titleMatch = (p.title || "").toLowerCase().includes(q);
            const authMatch = (p.authors || "").toLowerCase().includes(auth);
            return titleMatch && authMatch && p.year >= min && p.year <= max;
        });

        filtered.sort((a, b) => {
            const field = (sortField === 'title') ? 'title' : (sortField === 'citations' ? 'citations' : 'year');
            let valA = a[field];
            let valB = b[field];

            if (field === 'title') {
                return order === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
            }
            return order === 'desc' ? valB - valA : valA - valB;
        });

        // STABILIZED SCROLL MATH
        const totalVirtualHeight = filtered.length * ROW_HEIGHT;
        const vh = viewport.clientHeight;

        if (totalVirtualHeight > MAX_BROWSER_HEIGHT) {
            spacer.style.height = MAX_BROWSER_HEIGHT + 'px';
            scrollScale = (totalVirtualHeight - vh) / (MAX_BROWSER_HEIGHT - vh);
        } else {
            spacer.style.height = Math.max(totalVirtualHeight, 1) + 'px';
            scrollScale = 1;
        }

        document.getElementById('stats').innerText = `${filtered.length.toLocaleString()} RECORDS | ${selectedIds.size} TICKS`;
        render();
    }

    function render() {
        let virtualTop = viewport.scrollTop * scrollScale;
        const maxVirtualTop = Math.max(0, (filtered.length * ROW_HEIGHT) - viewport.clientHeight);
        
        // Anti-flicker boundary clamping
        if (virtualTop > maxVirtualTop) virtualTop = maxVirtualTop;

        const startIndex = Math.max(0, Math.floor(virtualTop / ROW_HEIGHT));
        const endIndex = Math.min(startIndex + VISIBLE_COUNT + 10, filtered.length);
        
        vTable.style.transform = `translate3d(0, ${viewport.scrollTop}px, 0)`;

        let html = '';
        for (let i = startIndex; i < endIndex; i++) {
            const p = filtered[i];
            if (!p) continue;
            const isSelected = selectedIds.has(p.url);
            const relativeTop = (i * ROW_HEIGHT) - virtualTop;
            
            html += `
                <tr class="v-row" style="top: ${relativeTop}px; background: ${isSelected ? 'rgba(212, 175, 55, 0.12)' : 'transparent'}">
                    <td class="v-td" style="max-width: 80px; text-align: center;">
                        <div style="font-family: monospace; color: var(--text-gold); font-size: 11px;">#${i + 1}</div>
                        <input type="checkbox" ${isSelected ? 'checked' : ''} onchange="toggleSelection('${p.url}')" style="width: 18px; height: 18px; accent-color: var(--text-gold); cursor: pointer;">
                    </td>
                    <td class="v-td">
                        <span class="paper-title" title="${p.title}">${p.title}</span>
                        <span class="paper-authors">${p.authors}</span>
                    </td>
                    <td class="v-td" style="max-width: 120px; color: var(--link-color); font-weight: 900;">${Number(p.citations).toLocaleString()}</td>
                    <td class="v-td" style="max-width: 80px; font-family: monospace;">${p.year}</td>
                    <td class="v-td" style="max-width: 140px; text-align: right;">
                        <a href="${p.url}" target="_blank" style="color: var(--text-gold); font-size: 10px; text-decoration: none; font-weight: 900; border: 1px solid var(--text-gold); padding: 5px 12px;">OPEN_PORTAL</a>
                    </td>
                </tr>
            `;
        }
        vBody.innerHTML = html;
    }

    function updateAuthorSuggestions() {
        const val = document.getElementById('searchAuthor').value.toLowerCase();
        const datalist = document.getElementById('authorSuggestions');
        if (val.length < 3) return; // Only suggest after 3 chars for performance
        const matches = new Set();
        for (let i = 0; i < allPapers.length; i++) {
            if (matches.size > 15) break;
            if ((allPapers[i].authors || "").toLowerCase().includes(val)) {
                allPapers[i].authors.split(';').forEach(name => {
                    if (name.toLowerCase().includes(val)) matches.add(name.trim());
                });
            }
        }
        datalist.innerHTML = Array.from(matches).map(m => `<option value="${m}">`).join("");
    }

    function jumpToIndex() {
        const val = parseInt(document.getElementById('jumpIndex').value) - 1;
        if (val >= 0 && val < filtered.length) {
            viewport.scrollTop = (val * ROW_HEIGHT) / scrollScale;
            render();
        }
    }

    function toggleSelection(url) {
        selectedIds.has(url) ? selectedIds.delete(url) : selectedIds.add(url);
        render();
        document.getElementById('stats').innerText = `${filtered.length.toLocaleString()} RECORDS | ${selectedIds.size} TICKS`;
    }

    function saveState() {
        localStorage.setItem('selectedPapers', JSON.stringify([...selectedIds]));
        alert('SYSTEM_STATE_ARCHIVED');
    }

    function exportSelectedCSV() {
        const selectedData = allPapers.filter(p => selectedIds.has(p.url));
        if (!selectedData.length) return;
        const headers = ["title", "authors", "citations", "year", "url"];
        const csv = [headers.join(','), ...selectedData.map(row => headers.map(f => `"${String(row[f]||"").replace(/"/g, '""')}"`).join(','))].join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = window.URL.createObjectURL(blob);
        a.download = `vault_export_${Date.now()}.csv`;
        a.click();
    }

    viewport.addEventListener('scroll', render, { passive: true });
    window.onload = initVault;
</script>
</body>
</html>
