<!DOCTYPE html>

<head>

  <style>
    #raw-player {
        width: 100%;
        height: 100%;
        background: #000;
        border: 1px solid var(--border-header-bottom);
    }

    .playlist-item.playing {
        color: var(--border-header-bottom);
        background: transparent;
        font-weight: bold;
        text-shadow: 0 0 5px var(--border-header-bottom);
    }
  </style>

  <script>
    const savedTheme = localStorage.getItem('theme');
    const systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    const initialTheme = savedTheme || "dark";
    document.documentElement.setAttribute('data-theme', initialTheme);

    function updateIcon(theme) {
      const iconSpan = document.getElementById('theme-icon');
      if (iconSpan) {
        iconSpan.innerHTML = (theme === "dark") ? "☀️" : "🌙";
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      updateIcon(document.documentElement.getAttribute('data-theme'));
    });

    function modeSwitcher() {
      let currentMode = document.documentElement.getAttribute('data-theme');
      let nextMode = (currentMode === "dark") ? "light" : "dark";
      document.documentElement.setAttribute('data-theme', nextMode);
      localStorage.setItem('theme', nextMode);
      updateIcon(nextMode);
    }
  </script>
</head>

    const STORAGE_KEY = 'mediaPlayerState';
    let currentVideoIndex = 0;
    let videoPlayer;

    function saveState() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
                index: currentVideoIndex,
                time: videoPlayer ? videoPlayer.currentTime : 0,
                isPlaying: videoPlayer ? !videoPlayer.paused : false,
                terminalOpen: document.getElementById('media-terminal')
                                ? document.getElementById('media-terminal').classList.contains('active')
                                : false
            }));
        } catch(e) {}
    }

    function loadState() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            return raw ? JSON.parse(raw) : null;
        } catch(e) { return null; }
    }

    document.addEventListener("DOMContentLoaded", function() {
        videoPlayer = document.getElementById('raw-player');
        const terminal = document.getElementById('media-terminal');
        const handle = document.getElementById('terminal-handle');
        const playlist = document.getElementById('playlist');
        const shuffleBtn = document.getElementById('shuffle-btn');

        // Build playlist UI
        mediaList.forEach((media, index) => {
            const item = document.createElement('div');
            item.className = 'playlist-item';
            item.innerHTML = `> ${media.title}`;
            item.onclick = () => playVideo(index);
            playlist.appendChild(item);
        });

        // Restore state from localStorage
        const savedState = loadState();
        if (savedState && savedState.index >= 0 && savedState.index < mediaList.length) {
            currentVideoIndex = savedState.index;
            videoPlayer.src = mediaList[currentVideoIndex].url;
            videoPlayer.load();
            updatePlaylistUI(currentVideoIndex);

            if (savedState.isPlaying) {
                videoPlayer.addEventListener('loadedmetadata', function onMeta() {
                    videoPlayer.removeEventListener('loadedmetadata', onMeta);
                    if (savedState.time > 0) videoPlayer.currentTime = savedState.time;
                    videoPlayer.play().catch(() => {});
                });
            } else {
                videoPlayer.addEventListener('loadedmetadata', function onMeta() {
                    videoPlayer.removeEventListener('loadedmetadata', onMeta);
                    if (savedState.time > 0) videoPlayer.currentTime = savedState.time;
                });
            }

            if (savedState.terminalOpen) {
                terminal.classList.add('active');
                handle.innerText = '[ CLOSE ]';
            }
        } else {
            // Fresh start
            videoPlayer.src = mediaList[0].url;
            updatePlaylistUI(0);
        }

        function playVideo(index) {
            currentVideoIndex = index;
            videoPlayer.src = mediaList[index].url;
            videoPlayer.load();
            videoPlayer.play().catch(e => console.log("Autoplay blocked:", e));
            updatePlaylistUI(index);
            saveState();
        }

        function playNext() {
            currentVideoIndex = (currentVideoIndex + 1) % mediaList.length;
            playVideo(currentVideoIndex);
        }

        function updatePlaylistUI(index) {
            const items = document.querySelectorAll('.playlist-item');
            items.forEach(el => el.classList.remove('playing'));
            if (items[index]) {
                items[index].classList.add('playing');
                items[index].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        videoPlayer.onended = () => playNext();

        // Save time periodically every 5s while playing
        let lastSave = 0;
        videoPlayer.addEventListener('timeupdate', () => {
            const now = Date.now();
            if (now - lastSave > 1) {
                lastSave = now;
                saveState();
            }
        });

        videoPlayer.addEventListener('pause', saveState);
        videoPlayer.addEventListener('play', saveState);

        // Save before navigating away
        window.addEventListener('pagehide', saveState);
        window.addEventListener('beforeunload', saveState);

        shuffleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            playVideo(Math.floor(Math.random() * mediaList.length));
        });

        function toggleTerminal(forceClose = false) {
            if (forceClose) terminal.classList.remove('active');
            else terminal.classList.toggle('active');
            handle.innerText = terminal.classList.contains('active') ? '[ CLOSE ]' : '[ MEDIA ]';
            saveState();
        }

        handle.addEventListener('click', (e) => { e.stopPropagation(); toggleTerminal(); });

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape" && terminal.classList.contains('active')) {
                toggleTerminal(true);
            }
        });
    });
  })();
  </script>

  <script type="text/javascript">
    let searchIndex = [];
    fetch('{{ site.baseurl }}/search.json')
        .then(response => response.json())
        .then(data => searchIndex = data);

    const searchOverlay = document.getElementById('search-overlay');
    const searchInput = document.getElementById('search-input');
    const searchResults = document.getElementById('search-results');

    document.addEventListener('keydown', function(e) {
        if ((e.metaKey || e.ctrlKey) && e.key === 'f') {
            e.preventDefault();
            openSearch();
        }
        if (e.key === 'Escape' && searchOverlay.style.display === 'flex') {
            closeSearch();
        }
    });

    function openSearch() {
        searchOverlay.style.display = 'flex';
        searchInput.focus();
    }

    function closeSearch() {
        searchOverlay.style.display = 'none';
        searchInput.value = '';
        searchResults.innerHTML = '';
    }

    searchInput.addEventListener('input', function() {
        const query = this.value.toLowerCase();
        searchResults.innerHTML = '';
        if (query.length < 2) return;
        const matches = searchIndex.filter(item =>
            item.title.toLowerCase().includes(query) ||
            item.content.toLowerCase().includes(query)
        ).slice(0, 5);
        matches.forEach(match => {
            const content = match.content;
            const index = content.toLowerCase().indexOf(query);
            let start = Math.max(0, index - 30);
            let end = Math.min(content.length, index + query.length + 30);
            let snippet = content.substring(start, end);
            const encodedQuery = encodeURIComponent(query);
            const div = document.createElement('div');
            div.style.padding = '15px';
            div.style.borderBottom = '1px solid #333';
            div.style.cursor = 'pointer';
            const targetUrl = `${match.url}#:~:text=${encodedQuery}`;
            div.innerHTML = `
                <a href="${targetUrl}" style="color: #ffcc00; text-decoration:none;">
                    <div style="font-weight:800; font-size: 1rem;">> ${match.title}</div>
                    <div style="font-size: 0.75rem; color: #888; margin-top: 5px; font-style: italic;">
                        "...${snippet.replace(new RegExp(query, 'gi'), (m) => `<span style="color:#ffcc00; font-weight:bold;">${m}</span>`)}..."
                    </div>
                </a>`;
            searchResults.appendChild(div);
        });
    });
  </script>

  <script>
    let quoteIndex = [];

    fetch('{{ site.baseurl }}/quote.json')
        .then(response => response.json())
        .then(data => {
            quoteIndex = data;
            refreshPortalQuote();
        })
        .catch(err => console.error("Could not load quote.json", err));

    function refreshPortalQuote() {
        const quoteText = document.getElementById('quote-text');
        if (quoteText && quoteIndex.length > 0) {
            const randomQuote = quoteIndex[Math.floor(Math.random() * quoteIndex.length)];
            quoteText.innerText = randomQuote;
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        const portalWindow = document.getElementById('portal-window');
        const portalFrame = document.getElementById('portal-frame');
        let scrollInterval;

        document.querySelectorAll('.portal-trigger').forEach(trigger => {
            trigger.addEventListener('mouseenter', () => {
                refreshPortalQuote();
                const url = trigger.getAttribute('href');
                portalWindow.style.display = 'block';

                if (!portalFrame.src.includes(url)) {
                    portalFrame.style.opacity = '0';
                    portalFrame.src = url;
                    portalFrame.onload = function() {
                        portalFrame.style.transition = 'opacity 0.5s ease';
                        portalFrame.style.opacity = '0.9';
                        clearInterval(scrollInterval);
                        let scrollPos = 0;
                        scrollInterval = setInterval(() => {
                            scrollPos += 0.5;
                            if (scrollPos > 500) scrollPos = 0;
                            portalFrame.style.transform = `scale(0.4) translateY(-${scrollPos}px)`;
                        }, 20);
                    };
                }
            });

            trigger.addEventListener('mousemove', (e) => {
                let x = e.clientX + 30;
                let y = e.clientY - 150;
                const windowWidth = 520;
                const windowHeight = 420;
                if (x + windowWidth > window.innerWidth) x = e.clientX - (windowWidth + 10);
                if (y + windowHeight > window.innerHeight) y = window.innerHeight - (windowHeight + 20);
                if (y < 10) y = 10;
                portalWindow.style.left = x + 'px';
                portalWindow.style.top = y + 'px';
            });

            trigger.addEventListener('mouseleave', () => {
                portalWindow.style.display = 'none';
                clearInterval(scrollInterval);
            });
        });
    });
  </script>

  <script>
    document.querySelectorAll('.video-item').forEach(item => {
        const trigger = item.querySelector('.video-trigger');
        const playBtn = item.querySelector('.play-btn');
        const frame = item.querySelector('.video-frame');
        const cover = item.querySelector('.cover-ui');
        const videoId = trigger.getAttribute('data-video-id');
        trigger.addEventListener('click', (e) => e.preventDefault());
        playBtn.addEventListener('click', () => {
            frame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
            frame.style.display = "block";
            cover.style.display = "none";
        });
        item.addEventListener('mouseleave', () => {
            frame.src = "";
            frame.style.display = "none";
            cover.style.display = "flex";
        });
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === "Escape") {
            document.querySelectorAll('.video-item').forEach(item => {
                const frame = item.querySelector('.video-frame');
                const cover = item.querySelector('.cover-ui');
                const previewBox = item.querySelector('.preview-box');
                frame.src = "";
                frame.style.display = "none";
                cover.style.display = "flex";
                if (previewBox) {
                    previewBox.style.display = "none";
                    setTimeout(() => previewBox.style.removeProperty('display'), 100);
                }
            });
        }
    });
  </script>

  <script>
    function updateClock() {
        const now = new Date();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const year = now.getFullYear();
        const time = now.toTimeString().split(' ')[0];
        const clockEl = document.getElementById('live-clock');
        if (clockEl) clockEl.innerHTML = `${month}-${day}-${year} ${time}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    async function getGeolocation() {
        try {
            const response = await fetch('http://ip-api.com/json/');
            const data = await response.json();
            const locEl = document.getElementById('user-location');
            if (locEl) {
                if (data.status === "success") {
                    locEl.innerHTML = `${data.city.toUpperCase()}, ${data.countryCode.toUpperCase()}`;
                } else {
                    locEl.innerHTML = "UNKNOWN_NODE";
                }
            }
        } catch (error) {
            const locEl = document.getElementById('user-location');
            if (locEl) locEl.innerHTML = "OFFLINE_CORE";
        }
    }
    getGeolocation();
  </script>
