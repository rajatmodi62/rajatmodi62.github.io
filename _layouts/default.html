<!DOCTYPE html>
<html>
<head>
  {% include head.html %}
  
  <script>
    // 1. SET INITIAL THEME (Run this immediately in <head>)
    const savedTheme = localStorage.getItem('theme');
    const systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    const initialTheme = savedTheme || (systemDark ? "dark" : "light");
    
    document.documentElement.setAttribute('data-theme', initialTheme);

    // 2. ICON UPDATE LOGIC
    function updateIcon(theme) {
      const iconSpan = document.getElementById('theme-icon');
      if (iconSpan) {
        iconSpan.innerHTML = (theme === "dark") ? "☀️" : "🌙";
      }
    }

    // Ensure icon matches theme once the page loads
    window.addEventListener('DOMContentLoaded', () => {
      updateIcon(document.documentElement.getAttribute('data-theme'));
    });

    // 3. THE TOGGLE FUNCTION
    function modeSwitcher() {
      let currentMode = document.documentElement.getAttribute('data-theme');
      // If currentMode is null or light, go dark. Otherwise, go light.
      let nextMode = (currentMode === "dark") ? "light" : "dark";
      
      document.documentElement.setAttribute('data-theme', nextMode);
      localStorage.setItem('theme', nextMode);
      updateIcon(nextMode);
    }
  </script>
</head>



<body>
  {% include header.html %}

  <div class="page-content">
    <div class="wrap">
      {{ content }}
    </div>
  </div>

  {% include footer.html %}


<div id="search-overlay" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background: rgba(0,0,0,0.85); z-index:1000000; justify-content:center; align-items:start; padding-top:15vh;">
    <div style="width: 80%; max-width: 600px;">
        <input type="text" id="search-input" placeholder="SEARCH..." autocomplete="off" 
               style="width:100%; padding:20px; background:transparent; border: 2px solid #ffcc00; color: #ffcc00; font-family: 'Courier New', monospace; font-size: 1.5rem; outline:none; box-shadow: 0 0 20px rgba(255, 204, 0, 0.3);">
        <div id="search-results" style="margin-top:20px; max-height: 50vh; overflow-y:auto; font-family: 'Courier New', monospace; background: rgba(0,0,0,0.9); border: 1px solid #444;"></div>
        <p style="color: #ffcc00; font-family: 'Courier New', monospace; font-size: 0.7rem; margin-top: 10px; opacity: 0.7;">[ ESC ] TO EXIT</p>
    </div>
</div>


<script type="text/javascript">
  let searchIndex = [];

  // Fetch the index once when page loads
  fetch('{{ site.baseurl }}/search.json')
      .then(response => response.json())
      .then(data => searchIndex = data);

  const searchOverlay = document.getElementById('search-overlay');
  const searchInput = document.getElementById('search-input');
  const searchResults = document.getElementById('search-results');

  document.addEventListener('keydown', function(e) {
      // Check for Cmd+F (Mac) or Ctrl+F (Windows)
      if ((e.metaKey || e.ctrlKey) && e.key === 'f') {
          e.preventDefault(); // Stop the browser's default search
          openSearch();
      }
      
      // Close on ESC
      if (e.key === 'Escape' && searchOverlay.style.display === 'flex') {
          closeSearch();
      }
  });

  function openSearch() {
      searchOverlay.style.display = 'flex';
      searchInput.focus();
  }

  function closeSearch() {
      searchOverlay.style.display = 'none';
      searchInput.value = '';
      searchResults.innerHTML = '';
  }

  searchInput.addEventListener('input', function() {
    const query = this.value.toLowerCase();
    searchResults.innerHTML = '';

    if (query.length < 2) return;

    const matches = searchIndex.filter(item => 
        item.title.toLowerCase().includes(query) || 
        item.content.toLowerCase().includes(query)
    ).slice(0, 5);

    matches.forEach(match => {
        // Find the snippet containing the keyword
        const content = match.content;
        const index = content.toLowerCase().indexOf(query);
        
        // Extract a "precise line" (approx 60 chars around the keyword)
        let start = Math.max(0, index - 30);
        let end = Math.min(content.length, index + query.length + 30);
        let snippet = content.substring(start, end);
        
        // Clean up the snippet for the URL
        const encodedQuery = encodeURIComponent(query);

        const div = document.createElement('div');
        div.style.padding = '15px';
        div.style.borderBottom = '1px solid #333';
        div.style.cursor = 'pointer';
        
        // The URL now includes the Scroll-To-Text fragment logic
        const targetUrl = `${match.url}#:~:text=${encodedQuery}`;

        div.innerHTML = `
            <a href="${targetUrl}" style="color: #ffcc00; text-decoration:none;">
                <div style="font-weight:800; font-size: 1rem;">> ${match.title}</div>
                <div style="font-size: 0.75rem; color: #888; margin-top: 5px; font-style: italic;">
                    "...${snippet.replace(new RegExp(query, 'gi'), (m) => `<span style="color:#ffcc00; font-weight:bold;">${m}</span>`)}..."
                </div>
            </a>`;
        searchResults.appendChild(div);
    });
});
</script>

<div id="portal-window" style="
    display: none; 
    position: fixed; 
    width: 500px; 
    height: 400px; 
    background: #000; 
    border: 1px solid #ffcc00; 
    z-index: 1000000; 
    pointer-events: none; 
    box-shadow: 0 0 40px rgba(0,0,0,1), 0 0 10px rgba(255, 204, 0, 0.3);
    overflow: hidden;
    border-radius: 4px;
">
    <div style="background: #ffcc00; color: #000; font-family: monospace; font-size: 10px; padding: 2px 8px; font-weight: bold;">
       [{{ "now" | date: "%m-%d-%Y" }}] Dear visitor, Patience is the road to wisdom. Please be patient as the preview loads..... 
    </div>
    

    <iframe id="portal-frame" src="" style="
        width: 2250px; /* Width of your actual site */
        height: 2500px; 
        border: none;
        transform: scale(0.4); /* Shrink the whole site to fit the window */
        transform-origin: 0 0;
        opacity: 0.8;
    "></iframe>
</div>


<script>
document.addEventListener('DOMContentLoaded', function() {
    const portalWindow = document.getElementById('portal-window');
    const portalFrame = document.getElementById('portal-frame');

    // Create a listener for every link with the "portal-trigger" class
    document.querySelectorAll('.portal-trigger').forEach(trigger => {
        
        trigger.addEventListener('mouseenter', () => {
            const url = trigger.getAttribute('href');
            
            // 1. Show the window immediately
            portalWindow.style.display = 'block';
            
            // 2. Update the frame source only if it's different to save resources
            // We use .includes() to handle relative vs absolute URL matching
            if (!portalFrame.src.includes(url)) {
                portalFrame.style.opacity = '0'; // Hide frame while it loads
                portalFrame.src = url;
                
                // Once the internal page loads, fade it in for a "system engage" look
                portalFrame.onload = function() {
                    portalFrame.style.transition = 'opacity 0.5s ease';
                    portalFrame.style.opacity = '0.9';
                };
            }
        });

        trigger.addEventListener('mousemove', (e) => {
            // Offset coordinates (30px right, 150px up from cursor)
            let x = e.clientX + 30;
            let y = e.clientY - 150; 

            // SAFETY: Keep the window within the browser viewport bounds
            const windowWidth = 520; // Matches your CSS width + small buffer
            const windowHeight = 420; // Matches your CSS height + small buffer

            // Flip to the left if the mouse is too far right
            if (x + windowWidth > window.innerWidth) {
                x = e.clientX - (windowWidth + 10);
            }

            // Flip to the bottom if the mouse is too high up
            if (y + windowHeight > window.innerHeight) {
                y = window.innerHeight - (windowHeight + 20);
            }
            
            // Prevent it from disappearing off the top
            if (y < 10) y = 10;

            portalWindow.style.left = x + 'px';
            portalWindow.style.top = y + 'px';
        });

        trigger.addEventListener('mouseleave', () => {
            // Hide the system monitor when the mouse leaves the link
            portalWindow.style.display = 'none';
        });
    });
});
let scrollInterval;

document.querySelectorAll('.portal-trigger').forEach(trigger => {
    trigger.addEventListener('mouseenter', () => {
        const url = trigger.getAttribute('href');
        portalWindow.style.display = 'block';

        if (!portalFrame.src.includes(url)) {
            portalFrame.src = url;
            
            portalFrame.onload = function() {
                // Clear any existing scroll before starting a new one
                clearInterval(scrollInterval);
                
                // Cute Autoscroll Logic:
                // We move the "top" of the frame view slowly
                let scrollPos = 0;
                scrollInterval = setInterval(() => {
                    scrollPos += 0.5; // Change this number to adjust speed (0.5 is very smooth)
                    if (scrollPos > 500) scrollPos = 0; // Reset after it pans a bit
                    
                    // We use translate to "pan" the content upward
                    portalFrame.style.transform = `scale(0.5) translateY(-${scrollPos}px)`;
                }, 20); // 20ms for 60fps-like smoothness
            };
        }
    });

    trigger.addEventListener('mouseleave', () => {
        portalWindow.style.display = 'none';
        clearInterval(scrollInterval); // Stop scrolling when mouse leaves
    });
});
</script>



<script>
    document.querySelectorAll('.video-item').forEach(item => {
        const trigger = item.querySelector('.video-trigger');
        const playBtn = item.querySelector('.play-btn');
        const frame = item.querySelector('.video-frame');
        const cover = item.querySelector('.cover-ui');
        const videoId = trigger.getAttribute('data-video-id');

        // Prevent redirect
        trigger.addEventListener('click', (e) => e.preventDefault());

        // Play video
        playBtn.addEventListener('click', () => {
            frame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
            frame.style.display = "block";
            cover.style.display = "none";
        });

        // NEW: Stop audio when mouse leaves the entire video-item area
        item.addEventListener('mouseleave', () => {
            frame.src = ""; // This kills the audio immediately
            frame.style.display = "none";
            cover.style.display = "flex";
        });
    });

    // Global Reset on ESC Key
    document.addEventListener('keydown', (e) => {
        if (e.key === "Escape") {
            document.querySelectorAll('.video-item').forEach(item => {
                const frame = item.querySelector('.video-frame');
                const cover = item.querySelector('.cover-ui');
                const previewBox = item.querySelector('.preview-box');
                
                frame.src = ""; // Kill audio
                frame.style.display = "none";
                cover.style.display = "flex";
                
                // Momentarily hide the box to break the hover state
                previewBox.style.display = "none";
                setTimeout(() => {
                    previewBox.style.removeProperty('display');
                }, 100);
            });
        }
    });
</script>
</body>
</html>
