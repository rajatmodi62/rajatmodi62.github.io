---
layout: default
---

<style>
  /* FIXED BOTTOM PROGRESS CONTAINER */
  #progress-container {
      position: fixed !important;
      bottom: 0 !important;
      top: auto !important;
      left: 0 !important;
      right: 0 !important;
      width: 100% !important;
      height: 2rem;
      background: repeating-linear-gradient(45deg, #000, #000 10px, var(--border-header-bottom) 10px, var(--border-header-bottom) 20px);
      background-size: 28px 28px; 
      opacity: 0.6; 
      animation: stream-horizontal 10s linear infinite;
      z-index: 999999;
      cursor: pointer;
      border-top: 1px solid var(--border-header-bottom);
  }

  @keyframes stream-horizontal {
    from { background-position: 0 0; }
    to { background-position: 28px 0; }
  }

  #progress-bar {
      height: 100%;
      width: 0%;
      background-color: var(--border-header-bottom);
      box-shadow: 0 0 15px var(--border-header-bottom);
      transition: width 0.1s ease-out;
      position: relative;
  }

  #progress-bar::after {
      content: "";
      position: absolute;
      right: 0;
      top: 0;
      width: 4px;
      height: 100%;
      background: #fff;
      box-shadow: 0 0 20px #fff, 0 0 10px var(--border-header-bottom);
  }

  .post-container {
      display: flex; 
      border-left: 1px solid var(--border-header-bottom); 
      border-right: 1px solid var(--border-header-bottom); 
      min-height: 100vh; 
      margin: 0 auto; 
      max-width: 1200px;
      padding-bottom: 80px; 
  }
  .post { flex: 1; padding: 0 40px; }
  
  .post-container .sidebar-left, .post-container .sidebar-right {
      background-image: url("{{ site.baseurl }}/assets/img/godzilla/vitruvian.png") !important;
      background-repeat: repeat-y !important;
      background-position: center top !important;
      background-size: 50px !important;
      opacity: 0.8;
  }

  /* VIDEO TERMINAL SPECIFIC STYLES */
  #raw-player {
      width: 100%;
      height: 100%;
      background: #000;
      border: 1px solid var(--border-header-bottom);
  }

  .playlist-item.playing {
      color: var(--border-header-bottom);
      background: transparent; 
      font-weight: bold;
      text-shadow: 0 0 5px var(--border-header-bottom); 
  }

  /* VISUALIZER WIDGET (CSS Animation fallback) */
  #visualizer-container {
      width: 100%;
      height: 30px;
      display: flex;
      align-items: flex-end;
      gap: 2px;
      padding: 5px;
      background: #000;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
  }
  
  .bar {
      flex: 1;
      background: var(--border-header-bottom);
      height: 2px;
      transition: height 0.1s ease;
  }
</style>

<div id="media-terminal">
    <div id="terminal-handle">[ MEDIA ]</div>
    <div class="terminal-header">
        <span>Rajat's Music Collection 😃</span>
        <span id="shuffle-btn" style="cursor: pointer; color: var(--text-muted); border: 1px solid var(--text-muted); padding: 0 5px; font-size: 0.65rem; font-weight: 800;">[ SHUFFLE ]</span>
        <span style="opacity: 0.5;">0x{{ "now" | date: "%M%S" }}</span>
    </div>

    <div id="visualizer-container">
        </div>

    <div class="terminal-video-container">
        <video id="raw-player" controls preload="metadata"></video> 
    </div>
    <div class="terminal-playlist" id="playlist"></div>
</div>

<div id="progress-container"><div id="progress-bar"></div></div>

<div class="post-container">
  <div class="sidebar-left" style="width: 80px; min-width: 80px;"></div>
  <div class="post">
    <header class="post-header">
      <h1 style="color: var(--border-header-bottom);">{{ page.title }}</h1>
      <p class="meta">{{ page.date | date: "%b %-d, %Y" }}</p>
    </header>
    <article class="post-content">
      {{ content }}
    </article>
  </div>
  <div class="sidebar-right" style="width: 80px; min-width: 80px;"></div>
</div>

  let currentVideoIndex = 0;
  let videoPlayer;
  let isShuffle = true;
  let visInterval;

  document.addEventListener("DOMContentLoaded", function() {
    videoPlayer = document.getElementById('raw-player');
    const progressBar = document.getElementById('progress-bar');
    const progressContainer = document.getElementById('progress-container');
    const terminal = document.getElementById('media-terminal');
    const handle = document.getElementById('terminal-handle');
    const playlist = document.getElementById('playlist');
    const shuffleBtn = document.getElementById('shuffle-btn');
    const visContainer = document.getElementById('visualizer-container');

    // Generate Visualizer Bars
    for(let i=0; i<20; i++) {
        const b = document.createElement('div');
        b.className = 'bar';
        visContainer.appendChild(b);
    }

    function updateVisualizer() {
        if(videoPlayer.paused) return;
        const bars = document.querySelectorAll('.bar');
        bars.forEach(bar => {
            const h = Math.random() * 25 + 2;
            bar.style.height = h + 'px';
        });
    }

    mediaList.forEach((media, index) => {
        const item = document.createElement('div');
        item.className = 'playlist-item';
        item.innerHTML = `> ${media.title}`;
        item.onclick = (e) => {
            e.stopPropagation(); // Prevent closing when clicking a song
            playVideo(index);
        };
        playlist.appendChild(item);
    });

    function playVideo(index) {
        currentVideoIndex = index;
        videoPlayer.src = mediaList[index].url;
        videoPlayer.load();
        videoPlayer.play().catch(e => console.log("Playback error or interaction needed"));
        updatePlaylistUI(index);
    }

    function playNext() {
        if (isShuffle) {
            let nextIndex;
            do { nextIndex = Math.floor(Math.random() * mediaList.length); } 
            while (nextIndex === currentVideoIndex && mediaList.length > 1);
            playVideo(nextIndex);
        } else {
            currentVideoIndex = (currentVideoIndex + 1) % mediaList.length;
            playVideo(currentVideoIndex);
        }
    }

    function updatePlaylistUI(index) {
        const items = document.querySelectorAll('.playlist-item');
        items.forEach(el => el.classList.remove('playing'));
        if(items[index]) {
            items[index].classList.add('playing');
            items[index].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    }

    videoPlayer.onplay = () => {
        visInterval = setInterval(updateVisualizer, 100);
    };
    videoPlayer.onpause = () => {
        clearInterval(visInterval);
        document.querySelectorAll('.bar').forEach(b => b.style.height = '2px');
    };
    videoPlayer.onended = () => playNext();

    shuffleBtn.addEventListener('click', (e) => { 
        e.stopPropagation(); 
        isShuffle = !isShuffle;
        shuffleBtn.innerText = isShuffle ? '[ SHUFFLING ]' : '[ SHUFFLE ]';
        shuffleBtn.style.color = isShuffle ? 'var(--border-header-bottom)' : 'var(--text-muted)';
        if(isShuffle) playNext();
    });

    // Toggle handle logic
    handle.addEventListener('click', (e) => {
        e.stopPropagation(); // Stop click from propagating to document
        terminal.classList.toggle('active');
        handle.innerText = terminal.classList.contains('active') ? '[ CLOSE ]' : '[ MEDIA ]';
    });

    // Prevent closing when clicking inside the terminal content
    terminal.addEventListener('click', (e) => {
        e.stopPropagation();
    });

    // CLOSE WHEN CLICKING OUTSIDE
    document.addEventListener('click', (e) => {
        if (terminal.classList.contains('active')) {
            terminal.classList.remove('active');
            handle.innerText = '[ MEDIA ]';
        }
    });

    window.addEventListener('scroll', () => {
        const winScroll = window.pageYOffset || document.documentElement.scrollTop;
        const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        if (height > 0) progressBar.style.width = ((winScroll / height) * 100) + "%";
    });

    videoPlayer.src = mediaList[0].url;
    updatePlaylistUI(0);
  });
</script>
