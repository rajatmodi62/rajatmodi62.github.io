---
layout: default
---



<style>

  
  .post-container .sidebar-left, 
  .post-container .sidebar-right {
      background-image: url("{{ site.baseurl }}/assets/img/godzilla/vitruvian.png") !important;
      background-repeat: repeat-y !important;
      background-position: center top !important;
      background-size: 50px !important;
      opacity: 0.8;
      min-height: 100%;
  }

  .post-container .sidebar-left:hover, 
  .post-container .sidebar-right:hover {
      opacity: 0.8;
  }
</style>

<div class="post-container" style="
    display: flex; /* CRITICAL: Allows sidebars to sit next to content */
    border-left: 1px solid var(--border-header-bottom); 
    border-right: 1px solid var(--border-header-bottom); 
    min-height: 100vh; 
    margin: 0 auto; 
    max-width: 1200px; 
    padding: 0; /* Remove padding here so sidebars touch the edges */
">
  <div class="sidebar-left" style="width: 80px; min-width: 80px;"></div>

  <div class="post" style="flex: 1; padding: 0 40px;">
    <header class="post-header">
      <h1 style="color: var(--border-header-bottom);">{{ page.title }}</h1>
      <p class="meta">{{ page.date | date: "%b %-d, %Y" }}</p>
    </header>

    <article class="post-content">
      {{ content }}
    </article>
  </div>

  <div class="sidebar-right" style="width: 80px; min-width: 80px;"></div>
</div>


    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');

        function updateProgress() {
          const winScroll = window.pageYOffset || document.documentElement.scrollTop;
          const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
          if (height > 0) {
            const scrolled = (winScroll / height) * 100;
            progressBar.style.width = scrolled + "%";
          }
        }

        window.addEventListener('scroll', updateProgress);

        progressContainer.addEventListener('click', (e) => {
          const containerWidth = progressContainer.offsetWidth;
          const clickX = e.offsetX;
          const totalHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
          window.scrollTo({
            top: (clickX / containerWidth) * totalHeight,
            behavior: 'smooth'
          });
        });
      });
    </script>
  </body>
</html>
</div>

<script type="text/javascript">
  document.addEventListener('keydown', function(event) {
    // Check if the pressed key is 'Escape'
    if (event.key === "Escape") {
      // Redirect back to your home page
      // Using site.baseurl ensures it works on GitHub Pages
      window.location.href = "{{ site.baseurl }}/";
    }
  });
</script>
