---
layout: default
---

<style>
  /* FIXED BOTTOM PROGRESS CONTAINER */
  #progress-container {
      position: fixed !important;
      bottom: 0 !important;
      top: auto !important;
      left: 0 !important;
      right: 0 !important;
      width: 100% !important;
      height: 2rem;
      background: repeating-linear-gradient(45deg, #000, #000 10px, var(--border-header-bottom) 10px, var(--border-header-bottom) 20px);
      background-size: 28px 28px; 
      opacity: 0.6; 
      animation: stream-horizontal 10s linear infinite;
      z-index: 999999;
      cursor: pointer;
      border-top: 1px solid var(--border-header-bottom);
  }

  @keyframes stream-horizontal {
    from { background-position: 0 0; }
    to { background-position: 28px 0; }
  }

  #progress-bar {
      height: 100%;
      width: 0%;
      background-color: var(--border-header-bottom);
      box-shadow: 0 0 15px var(--border-header-bottom);
      transition: width 0.1s ease-out;
      position: relative;
  }

  #progress-bar::after {
      content: "";
      position: absolute;
      right: 0;
      top: 0;
      width: 4px;
      height: 100%;
      background: #fff;
      box-shadow: 0 0 20px #fff, 0 0 10px var(--border-header-bottom);
  }

  .post-container {
      display: flex; 
      border-left: 1px solid var(--border-header-bottom); 
      border-right: 1px solid var(--border-header-bottom); 
      min-height: 100vh; 
      margin: 0 auto; 
      max-width: 1200px;
      padding-bottom: 80px; 
  }
  .post { flex: 1; padding: 0 40px; }
  .post-container .sidebar-left, .post-container .sidebar-right {
      background-image: url("{{ site.baseurl }}/assets/img/godzilla/vitruvian.png") !important;
      background-repeat: repeat-y !important;
      background-position: center top !important;
      background-size: 50px !important;
      opacity: 0.8;
  }
</style>

<div id="media-terminal">
    <div id="terminal-handle">[ MEDIA ]</div>
    <div class="terminal-header">
        <span>Rajat's Music Collection 😃</span>
        <span id="shuffle-btn" style="cursor: pointer; color: var(--text-muted); border: 1px solid var(--text-muted); padding: 0 5px; font-size: 0.65rem; font-weight: 800;">[ SHUFFLE ]</span>
        <span style="opacity: 0.5;">0x{{ "now" | date: "%M%S" }}</span>
    </div>
    <div class="terminal-video-container">
        <div id="player"></div> 
    </div>
    <div class="terminal-playlist" id="playlist"></div>
</div>

<div id="progress-container"><div id="progress-bar"></div></div>

<div class="post-container">
  <div class="sidebar-left" style="width: 80px; min-width: 80px;"></div>
  <div class="post">
    <header class="post-header">
      <h1 style="color: var(--border-header-bottom);">{{ page.title }}</h1>
      <p class="meta">{{ page.date | date: "%b %-d, %Y" }}</p>
    </header>
    <article class="post-content">
      {{ content }}
    </article>
  </div>
  <div class="sidebar-right" style="width: 80px; min-width: 80px;"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
  let ytPlayer;
  let currentVideoIndex = 0;

  // Optimized list: Selected covers that generally allow cross-origin embedding
  const mediaList = [
    { title: "Pani Da Rang - Acoustic Cover", id: "YjDHXaDbkRY" },
    { title: "Abhi Mujh Mein - Veena Instrumental", id: "tbVPhwHHK04" },
    { title: "Kabhi Kabhi Mere Dil Mein - Veena", id: "iKp2DzwQbMg" },
    { title: "Tum Hi Ho - Veena Reload", id: "yNzRYZnv7RA" },
    { title: "Tu Hi Re - Flute Cover", id: "3YIGCN9YU34" },
    { title: "Saagar Kinare - Instrumental", id: "jx92a0f_gnA" },
    { title: "Yeh Honsla - Candlelight Cover", id: "HReN67juhCg" },
    { title: "Kabhi Jo Badal Barse - Arijit Cover", id: "q96kmZbSf7w" },
    { title: "Galliyan - Shirley Setia Cover", id: "aybAueelVCo" },
    { title: "Kabhi Kabhi Mere Dil Mein - Unplugged", id: "K8rgSXe23gQ" },
    { title: "Suraj Hua Maddham - Unplugged", id: "fba0psbDRYI" },
    { title: "Humko Humise Chura Lo - Unplugged", id: "hHMwZsTSCv8" },
    { title: "Hale Dil - Anushka Gupta Cover", id: "YS5UXmPRahg" }
  ];

function onYouTubeIframeAPIReady() {
    ytPlayer = new YT.Player('player', {
      height: '100%',
      width: '100%',
      videoId: mediaList[0].id,
      // THIS REDUCES ADS SIGNIFICANTLY
      host: 'https://www.youtube-nocookie.com', 
      playerVars: {
        'autoplay': 0,
        'rel': 0,
        'modestbranding': 1,
        'origin': window.location.origin
      },
      events: {
        'onStateChange': onPlayerStateChange,
        'onReady': onPlayerReady
      }
    });
  }

  function onPlayerError(e) {
      console.error("YT Player Error Code:", e.data);
      // If a video fails, skip to next after 2 seconds
      setTimeout(playNext, 2000);
  }

  function onPlayerReady(event) { updatePlaylistUI(0); }
  function onPlayerStateChange(event) { if (event.data === YT.PlayerState.ENDED) playNext(); }
  function playNext() { currentVideoIndex = (currentVideoIndex + 1) % mediaList.length; playVideo(currentVideoIndex); }
function playVideo(index) {
    currentVideoIndex = index;
    // We use the object syntax to ensure parameters are locked
    ytPlayer.loadVideoById({
      videoId: mediaList[index].id,
      host: 'https://www.youtube-nocookie.com'
    });
    updatePlaylistUI(index);
  }
  function updatePlaylistUI(index) {
    const items = document.querySelectorAll('.playlist-item');
    items.forEach(el => el.classList.remove('playing'));
    if(items[index]) {
        items[index].classList.add('playing');
        items[index].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }

  document.addEventListener("DOMContentLoaded", function() {
    const progressBar = document.getElementById('progress-bar');
    const progressContainer = document.getElementById('progress-container');
    const terminal = document.getElementById('media-terminal');
    const handle = document.getElementById('terminal-handle');
    const playlist = document.getElementById('playlist');
    const postContent = document.querySelector('.post-content');
    const shuffleBtn = document.getElementById('shuffle-btn');

    shuffleBtn.addEventListener('click', (e) => { e.stopPropagation(); playVideo(Math.floor(Math.random() * mediaList.length)); });

    function toggleTerminal(forceClose = false) {
        if (forceClose) terminal.classList.remove('active');
        else terminal.classList.toggle('active');
        handle.innerText = terminal.classList.contains('active') ? '[ CLOSE ]' : '[ MEDIA ]';
    }

    handle.addEventListener('click', (e) => { e.stopPropagation(); toggleTerminal(); });
    if(postContent) postContent.addEventListener('click', () => { if (terminal.classList.contains('active')) toggleTerminal(true); });

    mediaList.forEach((media, index) => {
        const item = document.createElement('div');
        item.className = 'playlist-item';
        item.innerHTML = `> ${media.title}`;
        item.onclick = () => playVideo(index);
        playlist.appendChild(item);
    });

    window.addEventListener('scroll', () => {
        const winScroll = window.pageYOffset || document.documentElement.scrollTop;
        const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        if (height > 0) progressBar.style.width = ((winScroll / height) * 100) + "%";
    });

    progressContainer.addEventListener('click', (e) => {
      const containerWidth = progressContainer.offsetWidth;
      const totalHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      window.scrollTo({ top: (e.clientX / containerWidth) * totalHeight, behavior: 'smooth' });
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === "Escape") {
            if (terminal.classList.contains('active')) toggleTerminal(true);
            else window.location.href = "{{ site.baseurl }}/";
        }
    });
  });
</script>
